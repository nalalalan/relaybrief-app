<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RelayBrief intake</title>
  <meta name="description" content="RelayBrief paid client intake.">
  <link rel="canonical" href="https://relaybrief.com/client-intake.html">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <script src="site-config.js"></script>
  <style>
    :root{--bg:#fbfaf7;--ink:#171511;--muted:#6d665d;--line:#ded9cf;--panel:#fffefb}
    *{box-sizing:border-box}
    html,body{max-width:100%;overflow-x:hidden}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.45}
    a{color:inherit;text-underline-offset:3px}
    main{width:min(calc(100% - 32px),680px);margin:0 auto;padding:56px 0}
    header{border-bottom:1px solid var(--line)}
    .top{width:min(calc(100% - 32px),680px);min-height:62px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .top>*{min-width:0}
    .brand{font-weight:760;text-decoration:none}
    h1{font-size:28px;line-height:1.1;margin:0 0 10px}
    p{margin:0;color:var(--muted);font-weight:560}
    form{margin-top:28px;padding-top:22px;border-top:1px solid var(--line)}
    label{display:block;margin:0 0 8px;color:var(--muted);font-size:14px;font-weight:700}
    input{width:100%;min-height:44px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--ink);font:inherit;padding:0 12px}
    .actions{display:flex;align-items:center;gap:12px;margin-top:16px;flex-wrap:wrap}
    button,.button{display:inline-flex;align-items:center;justify-content:center;min-height:40px;padding:0 14px;border:1px solid #242424;border-radius:6px;background:#242424;color:#fff;font-weight:700;cursor:pointer;text-decoration:none}
    .button.secondary{background:transparent;color:var(--ink);border-color:var(--line)}
    .status{min-height:24px;margin-top:14px;color:var(--muted);font-size:14px;font-weight:600}
    .status.error{color:#8e392f}
    .status.success{color:#2f6543}
    dl{margin:30px 0 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
    dl div{display:grid;grid-template-columns:130px minmax(0,1fr);gap:18px;padding:13px 0;border-top:1px solid var(--line)}
    dl div:first-child{border-top:0}
    dt{color:var(--muted);font-weight:700}
    dd{margin:0;font-weight:560}
    @media(max-width:560px){
      main,.top{width:100%;max-width:100%;padding-left:16px;padding-right:16px}
      .top{min-height:58px}
      .top a:last-child{display:none}
      p{overflow-wrap:anywhere}
      dl div{grid-template-columns:1fr;gap:4px}
      dd,dt,a{overflow-wrap:anywhere}
      .actions{display:grid}
      .button,button{width:100%}
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <a class="brand" href="/">RelayBrief</a>
      <a href="mailto:pham.alann@gmail.com">pham.alann@gmail.com</a>
    </div>
  </header>
  <main>
    <h1>Paid intake.</h1>
    <p>Access code from payment email.<br>No login. No password.</p>

    <form id="gateForm">
      <label for="accessCode">Access code</label>
      <input id="accessCode" type="text" autocomplete="off" placeholder="Access code">
      <div class="actions">
        <button id="redeemBtn" type="submit">Open intake</button>
        <a id="buyLink" class="button secondary" href="https://buy.stripe.com/bJe28t7Sa7DLgec29A2Nq08" target="_blank" rel="noopener">Open Stripe checkout</a>
      </div>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </form>

    <dl>
      <div><dt>Payment</dt><dd>Stripe checkout. Card numbers stay in Stripe.</dd></div>
      <div><dt>Safety</dt><dd>No download. No login. No password.</dd></div>
      <div><dt>Problem</dt><dd>Email <a href="mailto:pham.alann@gmail.com">pham.alann@gmail.com</a>.</dd></div>
    </dl>
  </main>
  <script>
    (function () {
      var config = window.AO_CONFIG || {};
      var apiBase = (config.API_BASE || "https://alan-operator-backend-production.up.railway.app").replace(/\/$/, "");
      var checkoutUrl = (config.FIRST_MONEY_CHECKOUT_URL || config.PACKET_CHECKOUT_URL || "https://buy.stripe.com/bJe28t7Sa7DLgec29A2Nq08").trim();
      var priceLabel = (config.FIRST_MONEY_PRICE_LABEL || config.PACKET_PRICE_LABEL || "$1").trim();
      var form = document.getElementById("gateForm");
      var input = document.getElementById("accessCode");
      var status = document.getElementById("status");
      var button = document.getElementById("redeemBtn");
      var buyLink = document.getElementById("buyLink");
      buyLink.href = checkoutUrl;
      buyLink.textContent = "Open Stripe checkout (" + priceLabel + ")";

      function setStatus(message, kind) {
        status.textContent = message || "";
        status.className = "status" + (kind ? " " + kind : "");
      }

      form.addEventListener("submit", async function (event) {
        event.preventDefault();
        var accessCode = (input.value || "").trim();
        if (!accessCode) {
          setStatus("Enter the access code from the payment email.", "error");
          return;
        }
        button.disabled = true;
        input.disabled = true;
        setStatus("Checking access.", "");
        try {
          var response = await fetch(apiBase + "/client-gate/redeem", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ access_code: accessCode })
          });
          var data = await response.json();
          if (data.status === "ok" && data.client_form_url) {
            setStatus("Access granted.", "success");
            window.location.href = data.client_form_url;
            return;
          }
          setStatus(data.message || "Access denied.", "error");
        } catch (error) {
          setStatus("Access check failed. Email Alan if this keeps happening.", "error");
        } finally {
          button.disabled = false;
          input.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
