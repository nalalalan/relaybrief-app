<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Relay Live</title>
  <meta name="description" content="Send messy sales-call notes to Relay and get a finished follow-up packet." />
  <link rel="canonical" href="https://relay.aolabs.io/#send-notes" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AO Labs" />
  <meta property="og:title" content="Relay by AO Labs" />
  <meta property="og:description" content="Send messy sales-call notes. Relay turns them into a recap, follow-up email, CRM notes, and next-step checklist." />
  <meta property="og:url" content="https://relaylive.aolabs.io/" />
  <meta property="og:image" content="https://relaylive.aolabs.io/og-image.png" />
  <meta property="og:image:secure_url" content="https://relaylive.aolabs.io/og-image.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Relay by AO Labs preview image." />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Relay by AO Labs" />
  <meta name="twitter:description" content="Send messy sales-call notes to Relay and get a finished follow-up packet." />
  <meta name="twitter:image" content="https://relaylive.aolabs.io/og-image.png" />
  <meta name="twitter:image:alt" content="Relay by AO Labs preview image." />
  <meta name="theme-color" content="#ffd6c5" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      color-scheme: light;
      --bg: #ffd6c5;
      --panel: #fffaf6;
      --text: #261712;
      --muted: #715d56;
      --line: #ead3c8;
      --accent: #c98a53;
      --accent-dark: #a66c3e;
      --shadow: 0 18px 44px rgba(20, 20, 20, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.36), rgba(255,255,255,0) 44%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(620px, 100%);
      padding: clamp(24px, 5vw, 42px);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .kicker {
      display: inline-flex;
      min-height: 34px;
      align-items: center;
      padding: 0 13px;
      border: 1px solid rgba(191, 134, 81, .24);
      border-radius: 999px;
      background: rgba(191, 134, 81, .08);
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 850;
    }

    h1 {
      max-width: 10ch;
      margin: 18px 0 14px;
      font-size: clamp(44px, 11vw, 76px);
      line-height: .93;
      letter-spacing: 0;
    }

    p {
      max-width: 46ch;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      font-weight: 620;
      line-height: 1.42;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 26px;
    }

    a {
      display: inline-flex;
      min-height: 52px;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border: 1.5px solid var(--line);
      border-radius: 16px;
      color: var(--text);
      font-weight: 900;
      text-decoration: none;
    }

    .primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    @media (max-width: 540px) {
      body { padding: 14px; }
      main { border-radius: 24px; }
      .actions { display: grid; }
      a { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <span class="kicker">Relay live</span>
    <h1>Send messy notes.</h1>
    <p>Relay Live now points into the main notes-first Relay flow. Paste one rough sales-call note and get the finished follow-up packet after Alan confirms the scope.</p>
    <div class="actions">
      <a class="primary" href="https://relay.aolabs.io/#send-notes">Send messy notes</a>
      <a href="https://relay.aolabs.io/sample.pdf">Open sample</a>
    </div>
  </main>
</body>
</html>
