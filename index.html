<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Relay</title>
  <meta name="description" content="Relay admin has moved into the main Relay workspace." />
  <link rel="canonical" href="https://relay.aolabs.io/" />
  <meta name="theme-color" content="#ffd6c5" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0d12;
      --panel: #10141b;
      --line: #202736;
      --text: #f5f7fb;
      --muted: #96a0b2;
      --green: #3fe774;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(440px, 100%);
      padding: 26px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel), #131923);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 32px;
      line-height: 1;
      letter-spacing: -.04em;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }
    a {
      color: var(--green);
      font-weight: 800;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>Relay moved.</h1>
    <p>This standalone page is closed. Open <a href="https://relay.aolabs.io/">Relay</a> instead.</p>
  </main>
</body>
</html>
